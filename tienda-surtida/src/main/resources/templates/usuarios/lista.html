<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>

<div layout:fragment="contenido">

    <div class="app-content-header">
        <div class="container-fluid">

            <div class="d-flex justify-content-between align-items-center">

                <h1>Gestión de Usuarios</h1>

                <a class="btn btn-primary"
                   th:href="@{/usuarios/nuevo}">
                    + Nuevo Usuario
                </a>

            </div>

        </div>
    </div>

            <div class="app-content">

                <div class="container-fluid">

                    <!-- TOAST ÉXITO -->
                    <div th:if="${success}"
                         class="toast-container position-fixed top-0 end-0 p-3">

                        <div class="toast show text-bg-success border-0">

                            <div class="d-flex">

                                <div class="toast-body">
                                    <i class="bi bi-check-circle-fill"></i>
                                    <span th:text="${success}"></span>
                                </div>

                                <button type="button"
                                        class="btn-close btn-close-white me-2 m-auto"
                                        data-bs-dismiss="toast">
                                </button>

                            </div>

                        </div>

                    </div>

                    <!-- TOAST ERROR -->
                    <div th:if="${error}"
                         class="toast-container position-fixed top-0 end-0 p-3">

                        <div class="toast show text-bg-danger border-0">

                            <div class="d-flex">

                                <div class="toast-body">
                                    <i class="bi bi-exclamation-triangle-fill"></i>
                                    <span th:text="${error}"></span>
                                </div>

                                <button type="button"
                                        class="btn-close btn-close-white me-2 m-auto"
                                        data-bs-dismiss="toast">
                                </button>

                            </div>

                        </div>

                    </div>

                    <!-- TOAST WARNING -->
                    <div th:if="${warning}"
                         class="toast-container position-fixed top-0 end-0 p-3">

                        <div class="toast show text-bg-warning border-0">

                            <div class="d-flex">

                                <div class="toast-body">
                                    <i class="bi bi-exclamation-circle-fill"></i>
                                    <span th:text="${warning}"></span>
                                </div>

                                <button type="button"
                                        class="btn-close me-2 m-auto"
                                        data-bs-dismiss="toast">
                                </button>

                            </div>

                        </div>

                    </div>


            <div class="card">

                <div class="card-body">
                    <div class="table-responsive">

                        <table class="table table-hover align-middle">

                            <thead class="table-dark">
                            <tr>
                                <th class="d-none d-md-table-cell">ID</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="u : ${usuarios}">

                                <td class="d-none d-md-table-cell" th:text="${u.idUsuario}"></td>

                                <td th:text="${u.usernameUsuario}"></td>

                                <td th:text="${u.rol != null ? u.rol.nombreRol : 'SIN ROL'}"></td>

                                <td>

                                <span th:if="${u.estadoUsuario}"
                                      class="badge bg-success">
                                    Activo
                                </span>

                                    <span th:unless="${u.estadoUsuario}"
                                          class="badge bg-danger">
                                    Inactivo
                                </span>

                                </td>

                                <td>


                                    <div class="btn-group" role="group">
                                        <div class="d-flex gap-2">

                                        <a class="btn btn-warning"
                                           th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}"
                                           title="Editar">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>

                                        <button type="button"
                                                class="btn btn-danger"
                                                th:if="${u.estadoUsuario and u.rol.nombreRol!='Dueña'}"
                                                th:data-id="${u.idUsuario}"
                                                onclick="confirmarDesactivacion(this)"
                                                title="Desactivar">

                                            <i class="bi bi-x-circle"></i>

                                        </button>

                                        <a class="btn btn-success"
                                           th:if="${!u.estadoUsuario}"
                                           th:href="@{/usuarios/estado/{id}(id=${u.idUsuario})}"
                                           title="Activar">

                                            <i class="bi bi-check-circle"></i>

                                        </a>

                                        <button type="button"
                                                class="btn btn-info"
                                                data-bs-toggle="modal"
                                                data-bs-target="#modalUsuario"
                                                th:attr="
                    data-username=${u.usernameUsuario},
                    data-nombre=${u.nombreUsuario},
                    data-apellido=${u.apellidoUsuario},
                    data-telefono=${u.telefonoUsuario},
                    data-rol=${u.rol.nombreRol},
                    data-estado=${u.estadoUsuario},
                    data-fecha=${u.fechaCreacionUsuario}"
                                                onclick="mostrarUsuario(this)"
                                                title="Ver información">

                                            <i class="bi bi-info-circle"></i>

                                        </button>

                                    </div>
                                        </divd-flex>

                                </td>

                            </tr>

                            </tbody>

                        </table>
                        <div class="modal fade" id="modalUsuario" tabindex="-1">
                            <div class="modal-dialog modal-dialog-centered">

                                <div class="modal-content rounded-4">

                                    <div class="modal-header bg-primary text-white">
                                        <h5 class="modal-title">Información del Usuario</h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>

                                    <div class="modal-body p-4">

                                        <div class="text-center mb-3">

                                            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mx-auto"
                                                 style="width:70px;height:70px;font-size:24px;"
                                                 id="mAvatar">
                                                U
                                            </div>

                                            <h5 class="mt-2 mb-0" id="mNombreCompleto">Usuario</h5>
                                            <small class="text-muted" id="mRolBadge">Rol</small>

                                        </div>

                                        <hr>

                                        <div class="list-group">

                                            <div class="list-group-item d-flex justify-content-between">
                                                <span>Usuario</span>
                                                <strong id="mUsername"></strong>
                                            </div>

                                            <div class="list-group-item d-flex justify-content-between">
                                                <span>Teléfono</span>
                                                <strong id="mTelefono"></strong>
                                            </div>

                                            <div class="list-group-item d-flex justify-content-between">
                                                <span>Estado</span>
                                                <span id="mEstado"></span>
                                            </div>

                                            <div class="list-group-item d-flex justify-content-between">
                                                <span>Fecha creación</span>
                                                <small id="mFecha"></small>
                                            </div>

                                        </div>

                                    </div>

                                </div>

                            </div>
                        </div>

                        <div class="modal fade" id="modalConfirmarDesactivar" tabindex="-1">

                            <div class="modal-dialog modal-dialog-centered">

                                <div class="modal-content">

                                    <div class="modal-header bg-danger text-white">

                                        <h5 class="modal-title">
                                            Confirmar desactivación
                                        </h5>

                                        <button type="button"
                                                class="btn-close btn-close-white"
                                                data-bs-dismiss="modal">
                                        </button>

                                    </div>

                                    <div class="modal-body">

                                        ¿Está seguro de desactivar este usuario?

                                    </div>

                                    <div class="modal-footer">

                                        <button type="button"
                                                class="btn btn-secondary"
                                                data-bs-dismiss="modal">
                                            Cancelar
                                        </button>

                                        <a id="btnConfirmarDesactivar"
                                           class="btn btn-danger">
                                            Sí, desactivar
                                        </a>

                                    </div>

                                </div>

                            </div>

                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>
    <script>
        function mostrarUsuario(el) {

            const d = el.dataset;

            const nombre = d.nombre ?? "-";
            const apellido = d.apellido ?? "-";

            // Nombre completo
            document.getElementById("mNombreCompleto").innerText =
                nombre + " " + apellido;

            // Avatar (iniciales)
            const inicial = (nombre.charAt(0) + apellido.charAt(0)).toUpperCase();
            document.getElementById("mAvatar").innerText = inicial;

            // Rol
            document.getElementById("mRolBadge").innerText = d.rol ?? "SIN ROL";

            // Datos normales
            document.getElementById("mUsername").innerText = d.username ?? "-";
            document.getElementById("mTelefono").innerText = d.telefono ?? "-";
            document.getElementById("mFecha").innerText = d.fecha ?? "-";

            // Estado bonito
            const estado = document.getElementById("mEstado");

            if (d.estado === "true") {
                estado.innerHTML = '<span class="badge bg-success">Activo</span>';
            } else {
                estado.innerHTML = '<span class="badge bg-danger">Inactivo</span>';
            }
        }
        document.addEventListener("DOMContentLoaded", function () {

            const toasts = document.querySelectorAll(".toast");

            toasts.forEach(toastEl => {

                const toast = new bootstrap.Toast(toastEl, {
                    delay: 4000
                });

                toast.show();
            });

        });
    </script>
     <script>

                function confirmarDesactivacion(btn){

                    const id = btn.dataset.id;

                    document.getElementById("btnConfirmarDesactivar")
                        .href = "/usuarios/eliminar/" + id;

                    const modal = new bootstrap.Modal(
                        document.getElementById("modalConfirmarDesactivar")
                    );

                    modal.show();
                }

   </script>
</div>
 <style>

            .btn-group .btn{
                padding: .45rem .75rem;
            }

            .btn-group .btn i{
                font-size: 1rem;
            }

 </style>

</body>
</html>
