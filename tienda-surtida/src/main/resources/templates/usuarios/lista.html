<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>

<div layout:fragment="contenido">

    <div class="app-content-header">
        <div class="container-fluid">

            <div class="d-flex justify-content-between align-items-center">

                <h1>Gestión de Usuarios</h1>

                <a class="btn btn-primary"
                   th:href="@{/usuarios/nuevo}">
                    + Nuevo Usuario
                </a>

            </div>

        </div>
    </div>

    <div class="app-content">

        <div class="container-fluid">

            <div class="card">

                <div class="card-body">

                    <table class="table table-striped table-hover">

                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Usuario</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="u : ${usuarios}">

                            <td th:text="${u.idUsuario}"></td>

                            <td th:text="${u.usernameUsuario}"></td>

                            <td th:text="${u.rol.nombreRol}"></td>

                            <td>

                                <span th:if="${u.estadoUsuario}"
                                      class="badge bg-success">
                                    Activo
                                </span>

                                <span th:unless="${u.estadoUsuario}"
                                      class="badge bg-danger">
                                    Inactivo
                                </span>

                            </td>

                            <td>

                                <a class="btn btn-warning btn-sm"
                                   th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}">
                                    Editar
                                </a>

                                <a class="btn btn-danger btn-sm"
                                   th:if="${u.estadoUsuario and u.rol.nombreRol!='Dueña'}"
                                   th:href="@{/usuarios/eliminar/{id}(id=${u.idUsuario})}"
                                   onclick="return confirm('¿Desactivar usuario?')">
                                    Desactivar
                                </a>

                                <a class="btn btn-info btn-sm"
                                   th:if="${!u.estadoUsuario}"
                                   th:href="@{/usuarios/estado/{id}(id=${u.idUsuario})}">
                                    Activar
                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
