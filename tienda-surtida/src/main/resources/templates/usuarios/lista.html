<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Gestión de Usuarios</h2>

        <a class="btn btn-primary" href="/usuarios/nuevo">
            + Nuevo Usuario
        </a>
    </div>

    <table class="table table-striped table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="u : ${usuarios}">
            <td th:text="${u.idUsuario}"></td>
            <td th:text="${u.usernameUsuario}"></td>
            <td th:text="${u.rol.nombreRol}"></td>

            <td>
                <span th:if="${u.estadoUsuario}" class="badge bg-success"
                     >Activo
                </span>
                <span th:unless="${u.estadoUsuario}" class="badge bg-danger"
                      >Inactivo
                </span>
            </td>

            <td>

                <!-- ediitar-->
                <a class="btn btn-warning btn-sm"
                   th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}">
                    Editar
                </a>

                <!-- elimiabr de manera logica, no se elimina tot -->
                <a class="btn btn-danger btn-sm"
                   th:if="${u.estadoUsuario and u.rol.nombreRol!='Dueña'}"
                   th:href="@{/usuarios/eliminar/{id}(id=${u.idUsuario})}"

                   onclick="return confirm('¿Desactivar usuario?')">
                    Desactivar
                </a>

                <!-- activar o descartivar -->
                <a class="btn btn-info btn-sm"
                   th:if="${!u.estadoUsuario}"
                   th:href="@{/usuarios/estado/{id}(id=${u.idUsuario})}">
                    activar
                </a>


            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
