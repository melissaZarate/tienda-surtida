<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Formulario de Usuario</h2>

    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

        <!-- ID oculto (para editar) -->
        <input type="hidden" th:field="*{idUsuario}">

        <!-- Usuario -->
        <div class="mb-3">
        <label>Nombre:</label>
        <input type="text"  class="form-control"th:field="*{nombreUsuario}" required>
        <br>
        </div>

        <div class="mb-3">
        <label>Apellido:</label>
        <input type="text" class="form-control" th:field="*{apellidoUsuario}" required>
        <br>
        </div>

        <div class="mb-3">
        <label>Teléfono:</label>
        <input type="text" class="form-control" th:field="*{telefonoUsuario}">
        <br>
        </div>

        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" th:field="*{usernameUsuario}" required>
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" th:field="*{passwordUsuario}">
            <small class="text-muted">Dejar vacío si no deseas cambiarla al editar</small>
        </div>

        <!-- Rol -->
        <div class="mb-3">
            <label class="form-label">Rol</label>
            <select class="form-select" th:field="*{rol.idRol}">
                <option th:each="r :${roles}"
                        th:value="${r.idRol}"
                        th:text="${r.nombreRol}">
                </option>
            </select>
        </div>

        <!-- Estado -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" th:field="*{estadoUsuario}">
            <label class="form-check-label">Usuario activo</label>
        </div>

        <!-- Botones -->
        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a href="/usuarios" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
