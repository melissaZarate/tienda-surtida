<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>

<div layout:fragment="contenido">

    <div class="app-content-header">
        <div class="container-fluid">

            <h1>
                <span th:if="${usuario.idUsuario == null}">
                    Nuevo Usuario
                </span>

                <span th:unless="${usuario.idUsuario == null}">
                    Editar Usuario
                </span>
            </h1>

        </div>
    </div>

    <div class="app-content">
        <div class="container-fluid">

            <div class="card">

                <div class="card-header">
                    <h3 class="card-title">
                        Formulario de Usuario
                    </h3>
                </div>

                <div class="card-body">

                    <form th:action="@{/usuarios/guardar}"
                          th:object="${usuario}"
                          method="post"
                          autocomplete="off">

                        <!-- ID oculto -->
                        <input type="hidden"
                               th:field="*{idUsuario}">

                        <div class="row">

                            <!-- Nombre -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nombre</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{nombreUsuario}"
                                       required>
                            </div>

                            <!-- Apellido -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellido</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{apellidoUsuario}"
                                       required>
                            </div>

                            <!-- Teléfono -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{telefonoUsuario}">
                            </div>

                            <!-- Usuario -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Usuario</label>

                                <input type="text"
                                       class="form-control"
                                       th:field="*{usernameUsuario}"
                                       autocomplete="off"
                                       required>
                            </div>

                            <!-- Contraseña -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contraseña</label>

                                <input type="password"
                                       class="form-control"
                                       th:field="*{passwordUsuario}"
                                       autocomplete="new-password">

                                <small class="text-muted">
                                    Dejar vacío si no desea cambiarla al editar.
                                </small>
                            </div>

                            <!-- Rol -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Rol</label>

                                <select class="form-select"
                                        th:field="*{rol.idRol}" required>
                                    <option value="" disabled >Seleccione un Rol </option>

                                    <option th:each="r : ${roles}"
                                            th:value="${r.idRol}"
                                            th:text="${r.nombreRol}">
                                    </option>

                                </select>
                            </div>

                        </div>

                        <!-- Estado -->
                        <div class="form-check mb-4">

                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{estadoUsuario}">

                            <label class="form-check-label">
                                Usuario activo
                            </label>

                        </div>

                        <!-- Botones -->
                        <button type="submit"
                                class="btn btn-success">
                            Guardar
                        </button>

                        <a th:href="@{/usuarios}"
                           class="btn btn-secondary">
                            Cancelar
                        </a>

                    </form>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
