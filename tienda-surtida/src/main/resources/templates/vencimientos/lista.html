<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="contenido">

    <h1 class="mb-3">
        <i class="bi bi-calendar-x text-primary"></i>
        Productos Próximos a Vencer
    </h1>

    <!-- ===================== -->
    <!-- 📱 MOBILE FIRST VIEW -->
    <!-- ===================== -->
    <div class="d-md-none">

        <div th:if="${#lists.isEmpty(lotes)}" class="alert alert-info">
            No hay productos próximos a vencer
        </div>

        <div th:each="l : ${lotes}" class="card mb-2 shadow-sm">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="mb-1 fw-bold" th:text="${l.nombreProducto}"></h6>

                    <span class="badge bg-danger"
                          th:if="${l.diasRestantes <= 7}">
                        Crítico
                    </span>

                    <span class="badge bg-warning text-dark"
                          th:if="${l.diasRestantes > 7 and l.diasRestantes <= 15}">
                        Próximo
                    </span>

                    <span class="badge bg-success"
                          th:if="${l.diasRestantes > 15}">
                        OK
                    </span>

                </div>

                <hr class="my-2">

                <p class="mb-1">
                    <strong>Cantidad:</strong>
                    <span th:text="${l.cantidad}"></span>
                </p>

                <p class="mb-0">
                    <strong>Días restantes:</strong>
                    <span th:text="${l.diasRestantes}"></span>
                </p>

            </div>
        </div>
    </div>

    <!-- ===================== -->
    <!-- 🖥️ DESKTOP VIEW -->
    <!-- ===================== -->
    <div class="d-none d-md-block">

        <div class="card">

            <div class="card-body table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Fecha Vencimiento</th>
                        <th>Días restantes</th>
                        <th>Estado</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="l : ${lotes}"
                        th:classappend="${l.diasRestantes <= 7} ? 'table-danger' :
                                        (${l.diasRestantes <= 15} ? 'table-warning' : '')">

                        <td th:text="${l.nombreProducto}"></td>

                        <td th:text="${l.cantidad}"></td>

                        <td th:text="${l.fechaVencimiento}"></td>

                        <td th:text="${l.diasRestantes} + ' días'"></td>

                        <td>

                            <span class="badge bg-danger"
                                  th:if="${l.diasRestantes <= 7}">
                                Crítico
                            </span>

                            <span class="badge bg-warning text-dark"
                                  th:if="${l.diasRestantes > 7 and l.diasRestantes <= 15}">
                                Próximo
                            </span>

                            <span class="badge bg-success"
                                  th:if="${l.diasRestantes > 15}">
                                OK
                            </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>

</html>
