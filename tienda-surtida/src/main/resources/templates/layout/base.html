<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tienda Surtida</title>


    <!-- AdminLTE -->
    <link rel="stylesheet" th:href="@{/css/adminlte.css}">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .app-sidebar {
            background: #1b2a4a !important;
        }

        .app-sidebar .nav-link {
            color: white !important;
        }

        .app-sidebar .nav-link:hover {
            background: #f97316 !important;
            color: white !important;
        }

        .app-sidebar .nav-link.active {
            background: #f97316 !important;
            color: white !important;
        }
    </style>

</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<div class="app-wrapper">

    <!-- =========================
         NAVBAR
    ========================== -->
    <nav class="app-header navbar navbar-expand bg-body">

        <div class="container-fluid">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link"
                       data-lte-toggle="sidebar"
                       href="#">

                        <i class="bi bi-list"></i>

                    </a>
                </li>

            </ul>

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
        <span class="nav-link">
            Sistema Tienda Surtida
        </span>
                </li>

                <!-- USUARIO LOGUEADO -->
                <li class="nav-item dropdown">

                    <a class="nav-link dropdown-toggle"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        <i class="bi bi-person-circle m-2 fs-4"></i>

                        <span class="fw-semibold fs-5" sec:authentication="name"></span>

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">

                   <!--     <li>
                <span class="dropdown-item-text">
                    Usuario activo
                </span>
                        </li>-->

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right"></i>
                                    Cerrar sesión
                                </button>
                            </form>
                        </li>

                    </ul>

                </li>

            </ul>

        </div>

    </nav>

    <!-- =========================
         SIDEBAR
    ========================== -->
    <aside class="app-sidebar bg-body-secondary shadow"
           data-bs-theme="dark">

        <!-- Logo -->
        <div class="sidebar-brand">

            <a th:href="@{/}" class="brand-link d-flex aling-items-center">
              <img th:src="@{/assets/img/logo (2).png }"
                    class="brand-image img-circle elevation-3"
                     alt="logo"
                     style="width:100%;height:100px;object-fit:contain;">


            </a>

        </div>

        <!-- Menú -->
        <div class="sidebar-wrapper">

            <nav class="mt-2">

                <ul class="nav sidebar-menu flex-column">

                    <!-- Inicio -->
                    <li class="nav-item">

                        <a th:href="@{/}"
                           class="nav-link">

                            <i class="nav-icon bi bi-house"></i>

                            <p>Inicio</p>

                        </a>

                    </li>

                    <!-- Usuarios -->
                    <li class="nav-item">

                        <a th:href="@{/usuarios}"
                           class="nav-link">

                            <i class="nav-icon bi bi-people"></i>

                            <p>Usuarios</p>

                        </a>

                    </li>
                    <li class="nav-item">

                        <a href="#" class="nav-link" data-lte-toggle="treeview">

                            <i class="nav-icon bi bi-box-seam"></i>

                            <p>
                                Productos e Inventario
                                <i class="nav-arrow bi bi-chevron-right"></i>
                            </p>

                        </a>

                        <ul class="nav nav-treeview">

                            <li class="nav-item">

                                <a th:href="@{/categorias}"
                                   class="nav-link">

                                    <i class="bi bi-tod"></i>
                                        <i class="bi bi-tags-fill nav-icon text-warning"></i>
                                    <p>Categorías</p>

                                </a>

                            </li>
                            <!--aqui boton para uidad medida-->
                            <li class="nav-item">

                                <a th:href="@{/unidades}"
                                   class="nav-link">

                                    <i class="bi bi-tod"></i>
                                    <i class="bi bi-calculator-fill nav-icon text-warning"></i>
                                    <p>Unidades de Medida</p>

                                </a>

                            </li>
                            <!--aqui boton para poductos-->
                            <li class="nav-item">

                                <a th:href="@{/productos}"
                                   class="nav-link">

                                    <i class="bi bi-tod"></i>
                                    <i class="bi bi-boxes nav-icon text-warning"></i>
                                    <p>Productos</p>

                                </a>

                            </li>

                        </ul>

                    </li>

                </ul>

            </nav>

        </div>

    </aside>

    <!-- =========================
         CONTENIDO PRINCIPAL
    ========================== -->
    <main class="app-main">

        <div class="app-content">

            <div class="container-fluid mt-3">


                <!-- Aquí se cargará el contenido
             <div th:replace="~{${contenido}}">
                    Contenido
                </div>-->
               <!-- <div th:replace="~{dashboard/index :: contenido}">
                </div>-->
                <div layout:fragment="contenido">

                </div>

            </div>

        </div>

    </main>

</div>

<!-- =========================
     SCRIPTS
========================== -->

<script th:src="@{/js/adminlte.js}"></script>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
