<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="contenido">

    <div class="container">

        <h2 class="mb-4">
            <i class="bi bi-cash-stack text-success"></i>
            Control de Caja
        </h2>

        <!-- MENSAJES -->

        <div th:if="${param.success}">
            <div class="alert alert-success">
                Operación realizada correctamente.
            </div>
        </div>

        <div th:if="${param.error}">
            <div class="alert alert-danger"
                 th:text="${param.error}">
            </div>
        </div>

        <!-- SI NO HAY CAJA ABIERTA -->

        <div th:if="${caja == null}">

            <div class="card shadow-sm border-0">

                <div class="card-body text-center">

                    <i class="bi bi-safe2 display-1 text-secondary"></i>

                    <h4 class="mt-3">
                        No existe una caja abierta
                    </h4>

                    <p class="text-muted">
                        Debe abrir una caja para registrar ventas y compras.
                    </p>

                    <a th:href="@{/caja/abrir}"
                       class="btn btn-success btn-lg w-100">

                        <i class="bi bi-unlock-fill"></i>
                        Abrir Caja

                    </a>

                </div>

            </div>

        </div>

        <!-- SI EXISTE CAJA ABIERTA -->

        <div th:if="${caja != null}">

            <div class="card shadow-sm border-0">

                <div class="card-header bg-success text-white">

                    <strong>
                        Caja Abierta
                    </strong>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <small class="text-muted">
                            Fecha de apertura
                        </small>

                        <h6 th:text="${#temporals.format(caja.fechaApertura,'dd/MM/yyyy HH:mm')}">
                        </h6>

                    </div>

                    <hr>

                    <div class="mb-3">

                        <small class="text-muted">
                            Monto Inicial
                        </small>

                        <h4 class="text-primary">

                            Bs
                            <span th:text="${caja.montoInicial}">
                            </span>

                        </h4>

                    </div>

                    <div class="mb-3">

                        <small class="text-muted">
                            Ingresos por Ventas
                        </small>

                        <h4 class="text-success">

                            Bs
                            <span th:text="${caja.totalIngresos}">
                            </span>

                        </h4>

                    </div>

                    <div class="mb-3">

                        <small class="text-muted">
                            Egresos por Compras
                        </small>

                        <h4 class="text-danger">

                            Bs
                            <span th:text="${caja.totalEgresos}">
                            </span>

                        </h4>

                    </div>

                    <hr>

                    <div class="text-center">

                        <small class="text-muted">
                            Dinero Disponible
                        </small>

                        <h1 class="text-success">

                            Bs
                            <span th:text="${caja.saldoFinal}">
                            </span>

                        </h1>

                    </div>

                </div>

                <div class="card-footer">

                    <form th:action="@{/caja/cerrar}"
                          method="post">

                        <button type="submit"
                                class="btn btn-danger btn-lg w-100">

                            <i class="bi bi-lock-fill"></i>
                            Cerrar Caja

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- HISTORIAL -->

        <div class="mt-4">

            <a th:href="@{/caja/historial}"
               class="btn btn-outline-primary w-100">

                <i class="bi bi-clock-history"></i>
                Ver Historial de Cajas

            </a>

        </div>

    </div>

</div>

</html>
