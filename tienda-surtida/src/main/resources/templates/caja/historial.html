<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="contenido">

    <div class="container-fluid">

        <!-- CABECERA -->

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2>
                <i class="bi bi-clock-history text-primary"></i>
                Historial de Cajas
            </h2>

            <a th:href="@{/caja}"
               class="btn btn-outline-secondary">

                <i class="bi bi-arrow-left"></i>
                Volver

            </a>

        </div>

        <!-- SIN REGISTROS -->

        <div th:if="${#lists.isEmpty(cajas)}"
             class="alert alert-info">

            No existen cajas registradas.

        </div>

        <!-- TABLA -->

        <div class="card shadow-sm"
             th:if="${!#lists.isEmpty(cajas)}">

            <div class="card-header">

                <strong>
                    Historial de Aperturas y Cierres de Caja
                </strong>

            </div>

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle mb-0">

                    <thead class="table-light">

                    <tr>

                        <th># Caja</th>

                        <th>Apertura</th>

                        <th>Cierre</th>

                        <th>Inicial</th>

                        <th>Ingresos</th>

                        <th>Egresos</th>

                        <th>Saldo Final</th>

                        <th>Estado</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="caja : ${cajas}">

                        <td th:text="${caja.idCaja}"></td>

                        <td th:text="${#temporals.format(caja.fechaApertura,'dd/MM/yyyy HH:mm')}">
                        </td>

                        <td>

                            <span th:if="${caja.fechaCierre != null}"
                                  th:text="${#temporals.format(caja.fechaCierre,'dd/MM/yyyy HH:mm')}">
                            </span>

                            <span th:if="${caja.fechaCierre == null}">
                                —
                            </span>

                        </td>

                        <td class="text-primary fw-bold">

                            Bs <span th:text="${caja.montoInicial}"></span>

                        </td>

                        <td class="text-success fw-bold">

                            Bs <span th:text="${caja.totalIngresos}"></span>

                        </td>

                        <td class="text-danger fw-bold">

                            Bs <span th:text="${caja.totalEgresos}"></span>

                        </td>

                        <td class="fw-bold">

                            Bs <span th:text="${caja.saldoFinal}"></span>

                        </td>

                        <td>

                            <span th:if="${caja.estado == 'ABIERTA'}"
                                  class="badge bg-success">

                                ABIERTA

                            </span>

                            <span th:if="${caja.estado == 'CERRADA'}"
                                  class="badge bg-secondary">

                                CERRADA

                            </span>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</html>
