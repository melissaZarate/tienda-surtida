<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="contenido">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h2>
                <i class="bi bi-clock-history text-primary"></i>
                Historial de Cajas
            </h2>

            <a th:href="@{/caja}"
               class="btn btn-outline-secondary">

                <i class="bi bi-arrow-left"></i>

            </a>

        </div>

        <!-- SI NO HAY REGISTROS -->

        <div th:if="${#lists.isEmpty(cajas)}"
             class="alert alert-info">

            No existen cajas registradas.

        </div>

        <!-- LISTADO -->

        <div th:if="${!#lists.isEmpty(cajas)}">

            <div class="card shadow-sm mb-3"
                 th:each="caja : ${cajas}">

                <div class="card-header d-flex justify-content-between">

                    <strong>
                        Caja #<span th:text="${caja.idCaja}"></span>
                    </strong>

                    <span th:if="${caja.estado == 'ABIERTA'}"
                          class="badge bg-success">

                        ABIERTA

                    </span>

                    <span th:if="${caja.estado == 'CERRADA'}"
                          class="badge bg-secondary">

                        CERRADA

                    </span>

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-6">

                            <small class="text-muted">
                                Apertura
                            </small>

                            <div th:text="${#temporals.format(caja.fechaApertura,'dd/MM/yyyy HH:mm')}">
                            </div>

                        </div>

                        <div class="col-6">

                            <small class="text-muted">
                                Cierre
                            </small>

                            <div th:if="${caja.fechaCierre != null}"
                                 th:text="${#temporals.format(caja.fechaCierre,'dd/MM/yyyy HH:mm')}">
                            </div>

                            <div th:if="${caja.fechaCierre == null}">
                                —
                            </div>

                        </div>

                    </div>

                    <hr>

                    <div class="row text-center">

                        <div class="col-4">

                            <small class="text-muted">
                                Inicial
                            </small>

                            <h6 class="text-primary">

                                Bs <span th:text="${caja.montoInicial}"></span>

                            </h6>

                        </div>

                        <div class="col-4">

                            <small class="text-muted">
                                Ingresos
                            </small>

                            <h6 class="text-success">

                                Bs <span th:text="${caja.totalIngresos}"></span>

                            </h6>

                        </div>

                        <div class="col-4">

                            <small class="text-muted">
                                Egresos
                            </small>

                            <h6 class="text-danger">

                                Bs <span th:text="${caja.totalEgresos}"></span>

                            </h6>

                        </div>

                    </div>

                    <hr>

                    <div class="text-center">

                        <small class="text-muted">
                            Saldo Final
                        </small>

                        <h4 class="text-success">

                            Bs <span th:text="${caja.saldoFinal}"></span>

                        </h4>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</html>
