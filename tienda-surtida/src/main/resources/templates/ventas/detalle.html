<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<div layout:fragment="contenido">

    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <div>
                <h2>
                    <i class="bi bi-receipt"></i>
                    Detalle de Venta
                </h2>

                <small class="text-muted">
                    Venta N°
                    <span th:text="${venta.idVenta}"></span>
                </small>
            </div>

            <a th:href="@{/ventas/historial}"
               class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>
                Volver
            </a>

        </div>

        <!-- DATOS GENERALES -->

        <!-- ENCABEZADO DE VENTA -->
        <div class="card mb-3 shadow-sm">

            <div class="card-body">

                <div class="row">

                    <!-- INFORMACIÓN DE VENTA -->
                    <div class="col-md-6">

                        <h5 class="mb-2">
                            <i class="bi bi-receipt"></i>
                            Detalle de Venta #<span th:text="${venta.idVenta}"></span>
                        </h5>

                        <p class="mb-1">
                            <strong>Fecha:</strong>
                            <span th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></span>
                        </p>

                        <p class="mb-1">
                            <strong>Vendedor:</strong>
                            <span th:text="${venta.usuario.nombreUsuario}"></span>
                        </p>

                    </div>

                    <!-- INFORMACIÓN DEL CLIENTE -->
                    <div class="col-md-6 text-md-end">

                        <h5 class="mb-2">
                            <i class="bi bi-person"></i>
                            Cliente
                        </h5>

                        <div th:if="${venta.cliente != null}">

                            <p class="mb-1">
                                <strong th:text="${venta.cliente.nombreCliente + ' ' + venta.cliente.apellidoCliente}"></strong>
                            </p>

                            <p class="mb-1">
                                CI:
                                <span th:text="${venta.cliente.ciCliente}"></span>
                            </p>

                            <p class="mb-1" th:text="${venta.cliente.telefonoCliente}"></p>

                            <p class="mb-1" th:text="${venta.cliente.direccionCliente}"></p>

                        </div>

                        <div th:if="${venta.cliente == null}">
                            <p class="text-muted">
                                Consumidor final
                            </p>
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- DETALLE -->

        <div class="card">

            <div class="card-header">
              <strong> Productos Vendidos</strong>
            </div>

            <div class="table-responsive">

                <table class="table table-dark">

                    <thead>

                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="detalle : ${venta.detalles}">

                        <td th:text="${detalle.producto.nombreProducto}"></td>

                        <td th:text="${detalle.cantidadDetalle}"></td>

                        <td>
                            Bs
                            <span th:text="${detalle.precioDetalleVenta}"></span>
                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

</html>
