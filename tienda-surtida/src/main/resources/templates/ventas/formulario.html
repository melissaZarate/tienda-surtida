<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{layout/base}">

<div layout:fragment="contenido">

    <div class="container-fluid">
        <h1>
            <i class="bi bi-rulers-fill text-primary"></i>
            <i class="bi bi-shop text-primary"></i>
            Registrar Venta</h1>


        <!--  BUSCADOR (mobile first) -->
        <form method="get" th:action="@{/ventas}" class="sticky-top bg-white p-2 shadow-sm">

            <div class="input-group input-group-lg">

                <input type="text"
                       name="q"
                       class="form-control"
                       placeholder="Buscar producto..."
                       th:value="${q}">

                <button class="btn btn-primary">
                    <i class="bi bi-search"></i>
                </button>

            </div>

        </form>

        <!--mensajes-->
        <div th:if="${param.success}">
            <div class="alert alert-success">
                Venta registrada correctamente
            </div>
        </div>

        <div th:if="${param.error}">
            <div class="alert alert-danger" th:text="${param.error}">
            </div>
        </div>

        <div class="row mt-2">

            <!--  PRODUCTOS -->
            <div class="col-12 col-md-7">

                <div class="row">

                    <div class="col-6 col-md-4 mb-3"
                         th:each="p : ${productos}">

                        <div class="card shadow-sm h-100">

                            <div class="card-body text-center">

                                <h6 class="mb-1"
                                    th:text="${p.nombreProducto}">
                                </h6>

                                <small class="text-muted d-block">
                                    Stock: <span th:text="${p.stockActualProducto}"></span>
                                </small>

                                <strong class="text-success d-block">
                                    Bs <span th:text="${p.precioVentaProducto}"></span>
                                </strong>

                                <form th:action="@{/ventas/agregar}" method="post">

                                    <input type="hidden"
                                           name="idProducto"
                                           th:value="${p.idProducto}">

                                    <input type="number"
                                           name="cantidad"
                                           value="1"
                                           min="1"
                                           class="form-control form-control-sm mt-2">

                                    <button class="btn btn-primary w-100 mt-2">
                                        + Agregar
                                    </button>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <!--  CARRITO -->
            <div class="col-12 col-md-5">

                <div class="card shadow-sm sticky-top" style="top:70px;">

                    <div class="card-header bg-primary text-white" >
                         Carrito de venta
                    </div>

                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(venta.items)}"
                             class="text-muted text-center">
                            Sin productos
                        </div>

                        <div th:each="item, iterStat : ${venta.items}"
                             class="d-flex justify-content-between border-bottom py-2">

                            <div>
                                <strong th:text="${item.nombreProducto}"></strong><br>
                                <small th:text="'x' + ${item.cantidad}"></small>
                            </div>

                            <div class="text-end">

                                <div th:text="${item.subtotal}"></div>

                                <a th:href="@{/ventas/eliminar/{i}(i=${iterStat.index})}"
                                   class="btn btn-sm btn-danger">
                                    x
                                </a>

                            </div>

                        </div>

                    </div>

                    <!-- Total -->
                    <div class="card-footer">

                        <h5 class="text-center">
                            Total: Bs <span th:text="${venta.calcularTotal()}"></span>
                        </h5>
                        <!--boton para finalizar con recibo y si recibo-->
                        <!-- FINALIZAR SIN RECIBO -->
                        <form th:action="@{/ventas/finalizar}"
                              method="post">

                            <button type="submit"
                                    class="btn btn-success w-100 mb-2">
                                Finalizar sin recibo
                            </button>

                        </form>

                        <!-- ABRIR MODAL -->
                        <button type="button"
                                class="btn btn-primary w-100"
                                onclick="preguntarRecibo()">

                            Finalizar con recibo

                        </button>
                        <!--modal para registro de ciente para recibo-->


                    <!--    <form th:action="@{/ventas/finalizar}" method="post">

                            <button class="btn btn-success w-100 btn-lg" style="background-color: #e86523; color:white;">
                                Finalizar Venta
                            </button>

                        </form>-->

                    </div>


                </div>

            </div>

        </div>

    </div>
    <!-- MODAL CLIENTE -->
    <diva class="modal fade"
          id="modalCliente"
          tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Datos para recibo
                    </h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <form id="formRecibo"
                      th:action="@{/ventas/recibo/finalizar}"
                      method="post">

                    <div class="modal-body">

                        <input type="number"
                               name="ciCliente"
                               class="form-control mb-2"
                               placeholder="CI"
                               required>

                        <input type="text"
                               name="nombreCliente"
                               class="form-control mb-2"
                               placeholder="Nombre"
                               required>

                        <input type="text"
                               name="apellidoCliente"
                               class="form-control mb-2"
                               placeholder="Apellido">

                        <input type="text"
                               name="telefonoCliente"
                               class="form-control mb-2"
                               placeholder="Teléfono">

                        <input type="text"
                               name="direccionCliente"
                               class="form-control"
                               placeholder="Dirección">

                    </div>

                    <div class="modal-footer">

                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">

                            Cancelar

                        </button>

                        <button type="submit"
                                class="btn btn-primary">

                            Guardar Venta y Generar Recibo

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </diva>
<script>
    document.getElementById("buscador").addEventListener("keyup", function () {
        let filtro = this.value.toLowerCase();
        let cards = document.querySelectorAll(".card");

        cards.forEach(card => {
            let texto = card.innerText.toLowerCase();
            card.style.display = texto.includes(filtro) ? "" : "none";
        });
    });
</script>
    <script>

        function preguntarRecibo() {

            let modal = new bootstrap.Modal(
                document.getElementById('modalCliente')
            );

            modal.show();
        }



    </script>
</div>

</html>
